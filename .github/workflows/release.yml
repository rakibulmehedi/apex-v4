name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ──────────────────────────────────────────────
  # JOB 1 — Validate before releasing
  # ──────────────────────────────────────────────
  validate:
    name: Pre-Release Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        # TA-Lib==0.6.8 bundles the C library (no apt-get needed since v0.5.0)
        run: pip install -r requirements.txt

      - name: Run full test suite
        run: pytest tests/ -v --tb=short --junit-xml=test-results.xml
        env:
          APEX_MT5_MODE: stub
          APEX_TRADING_MODE: paper

      - name: Risk formula verification — CalibrationEngine
        run: pytest tests/unit/test_engine.py -v --tb=short
        env:
          APEX_MT5_MODE: stub
          APEX_TRADING_MODE: paper

      - name: Risk formula verification — EWMA covariance
        run: pytest tests/unit/test_covariance.py -v --tb=short
        env:
          APEX_MT5_MODE: stub
          APEX_TRADING_MODE: paper

      - name: Risk formula verification — Chaos scenarios
        run: pytest tests/chaos/ -v --tb=short
        env:
          APEX_MT5_MODE: stub
          APEX_TRADING_MODE: paper

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-test-results-${{ github.ref_name }}
          path: test-results.xml

  # ──────────────────────────────────────────────
  # JOB 2 — Create GitHub Release
  # ──────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          echo "prev=${PREV:-}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          PREV="${{ steps.prev_tag.outputs.prev }}"

          if [ -n "$PREV" ]; then
            RANGE="${PREV}..HEAD"
            SINCE_LINE="Changes since \`${PREV}\`"
          else
            RANGE="HEAD"
            SINCE_LINE="Initial release"
          fi

          CHANGELOG=$(git log ${RANGE} --pretty=format:"- %s (%h)" --no-merges)

          # Write to file for multiline handling
          {
            echo "CHANGELOG<<EOF"
            echo "${CHANGELOG}"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          echo "since_line=${SINCE_LINE}" >> $GITHUB_OUTPUT

      - name: Prepare release artifacts
        run: |
          mkdir -p release-artifacts
          cp requirements.txt release-artifacts/
          cp ops/nssm_install.ps1 release-artifacts/
          cp ops/DEPLOYMENT_CHECKLIST.md release-artifacts/
          cp ops/RUNBOOK.md release-artifacts/
          # Strip any secrets from settings template before bundling
          grep -v 'password\|secret\|token\|key' config/settings.yaml > release-artifacts/settings.yaml.template || cp config/settings.yaml release-artifacts/settings.yaml.template

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "APEX V4 — ${{ github.ref_name }}"
          body: |
            ## What is APEX V4?

            APEX V4 is a production-grade hybrid regime-based algorithmic Forex trading system
            built on MetaTrader 5. It combines trend-following and mean-reversion strategies,
            selected dynamically by an ADX/volatility regime classifier, with a 7-gate
            mathematical risk engine that enforces position sizing, drawdown limits,
            and correlation-adjusted exposure at every trade decision.

            > **Warning:** This is a paper trading system. Not financial advice. Trade at your own risk.

            ---

            ## Release Highlights

            - **701 tests passing** — unit, integration, and chaos
            - **7-gate mathematical risk engine** — verified formulas (Section 7, zero deviations)
            - **Regime-based hybrid strategy** — ADX/volatility classifier, momentum + mean-reversion
            - **Paper trading validated** — 67.5% win rate, 120 trades, 0 crashes, 0 state drift
            - **Windows VPS + NSSM deployment** — MT5-native, auto-restart service
            - **Full Prometheus + Grafana observability** — 12 alert rules, 9 dashboard panels

            ---

            ## Build History

            | Phase | Description |
            |-------|-------------|
            | Phase 0 | V3 critical bug fixes (4 isolated fixes) |
            | Phase 1 | Data foundation — MT5 abstraction, feed, schema |
            | Phase 2 | Regime classifier + Alpha engines (momentum, mean-reversion) |
            | Phase 3 | Risk engine — 7-gate pipeline, verified Kelly/EWMA formulas |
            | Phase 4 | Execution + Learning loop — gateway, fill tracker, Kelly updater |
            | Phase 5 | Paper trading validated — 120 trades, 0 crashes |
            | Phase 6 | Production hardening — observability, deployment gate, CI/CD |

            ---

            ## Changelog

            ${{ steps.changelog.outputs.since_line }}

            ${{ steps.changelog.outputs.CHANGELOG }}

            ---

            ## Installation

            See [docs/DEPLOYMENT.md](docs/DEPLOYMENT.md) for full Windows VPS deployment instructions.

            **Quick start (Windows VPS):**
            ```powershell
            # 1. Clone repository
            git clone <repo-url> C:\apex_v4

            # 2. Install dependencies
            pip install -r requirements.txt
            pip install MetaTrader5

            # 3. Configure secrets
            copy ops\apex_v4.env secrets.env
            # Edit secrets.env with your credentials

            # 4. Install as Windows service
            .\ops\nssm_install.ps1
            ```

            ---

            ## Release Artifacts

            | File | Purpose |
            |------|---------|
            | `requirements.txt` | Python dependencies |
            | `nssm_install.ps1` | Windows service installer |
            | `DEPLOYMENT_CHECKLIST.md` | 50-item pre-live deployment gate |
            | `RUNBOOK.md` | Operator runbook |
            | `settings.yaml.template` | Config template (no secrets) |
          files: |
            release-artifacts/requirements.txt
            release-artifacts/nssm_install.ps1
            release-artifacts/DEPLOYMENT_CHECKLIST.md
            release-artifacts/RUNBOOK.md
            release-artifacts/settings.yaml.template
          draft: false
          prerelease: false
