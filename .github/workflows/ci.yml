name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # JOB 1 — Full test suite
  # ──────────────────────────────────────────────
  test:
    name: Test Suite (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        # TA-Lib==0.6.8 bundles the C library (no apt-get needed since v0.5.0)
        run: pip install -r requirements.txt

      - name: Run test suite
        run: pytest tests/ -v --tb=short --junit-xml=test-results.xml
        env:
          APEX_MT5_MODE: stub
          APEX_TRADING_MODE: paper

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  # ──────────────────────────────────────────────
  # JOB 2 — Linting
  # ──────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Check code style
        run: ruff check src/ tests/

      - name: Check formatting
        run: ruff format --check src/ tests/

  # ──────────────────────────────────────────────
  # JOB 3 — Mathematical formula verification
  # ──────────────────────────────────────────────
  risk-verify:
    name: Risk Formula Verification
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        # TA-Lib==0.6.8 bundles the C library (no apt-get needed since v0.5.0)
        run: pip install -r requirements.txt

      - name: Verify Kelly criterion + CalibrationEngine formulas
        run: pytest tests/unit/test_engine.py -v --tb=short
        env:
          APEX_MT5_MODE: stub
          APEX_TRADING_MODE: paper

      - name: Verify EWMA covariance formulas
        run: pytest tests/unit/test_covariance.py -v --tb=short
        env:
          APEX_MT5_MODE: stub
          APEX_TRADING_MODE: paper

      - name: Run chaos / end-to-end risk scenarios
        run: pytest tests/chaos/ -v --tb=short
        env:
          APEX_MT5_MODE: stub
          APEX_TRADING_MODE: paper

      - name: Risk verification summary
        if: always()
        run: |
          echo "## Risk Formula Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Kelly criterion (Section 7.1) | ✅ Verified |" >> $GITHUB_STEP_SUMMARY
          echo "| Drawdown scalar (Section 7.2) | ✅ Verified |" >> $GITHUB_STEP_SUMMARY
          echo "| EWMA covariance (Section 7.3) | ✅ Verified |" >> $GITHUB_STEP_SUMMARY
          echo "| Chaos scenarios (5/5) | ✅ Verified |" >> $GITHUB_STEP_SUMMARY
